<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f78" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Atlas Enterprise LifeOS</title>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">A</span>
          <div>
            <h1>Atlas Enterprise</h1>
            <p>LifeOS Decision Support</p>
          </div>
        </div>
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="搜尋文件、決策、情境" autocomplete="off" />
        </div>
        <nav id="categoryNav" class="category-nav" aria-label="Knowledge categories"></nav>
      </aside>
      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Decision-support PWA</p>
            <h2 id="pageTitle">LifeOS Knowledge Base</h2>
          </div>
          <div class="status" id="statusText">Loading</div>
        </header>
        <section class="dashboard-prototype" aria-label="Decision dashboard prototype">
          <div class="dashboard-header">
            <div>
              <p class="eyebrow">Decision Dashboard</p>
              <h3>家庭決策儀表板</h3>
            </div>
            <span id="dashboardDate">Fixture</span>
          </div>
          <div class="dashboard-switcher" id="dashboardSwitcher" aria-label="Dashboard scenario switcher"></div>
          <div class="metric-grid" id="metricGrid"></div>
          <div class="decision-panels">
            <div>
              <h4>情境比較</h4>
              <div id="scenarioList" class="scenario-list"></div>
            </div>
            <div>
              <h4>下一步</h4>
              <div id="actionList" class="action-list"></div>
            </div>
          </div>
        </section>
        <section class="content-grid">
          <div>
            <div class="list-tools">
              <span id="resultCount">0 results</span>
              <button id="clearFiltersButton" type="button">清除</button>
            </div>
            <div class="document-list" id="documentList"></div>
          </div>
          <article class="document-viewer" id="documentViewer">
            <p class="empty-state">選擇文件以檢視 LifeOS 決策、情境、規則與知識內容。</p>
          </article>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
