<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f78" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="src/styles.css" />
    <title>Atlas Enterprise 生活決策系統</title>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">A</span>
          <div>
            <h1>Atlas Enterprise</h1>
            <p>生活決策支援</p>
          </div>
        </div>
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="搜尋知識文件、規格或路徑" autocomplete="off" />
        </div>
        <nav id="categoryNav" class="category-nav" aria-label="知識分類"></nav>
      </aside>
      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">決策支援 PWA</p>
            <h2 id="pageTitle">生活知識庫</h2>
          </div>
          <div class="status" id="statusText">載入中</div>
        </header>
        <section class="dashboard-prototype" aria-label="決策儀表板原型">
          <div class="dashboard-header">
            <div>
              <p class="eyebrow">決策儀表板</p>
              <h3>決策支援儀表板</h3>
            </div>
            <span id="dashboardDate">資料快照</span>
          </div>
          <div class="dashboard-actions" aria-label="本地儀表板操作">
            <input id="scenarioNameInput" type="text" placeholder="本地情境名稱" />
            <input id="scenarioScoreInput" type="text" placeholder="分數或狀態" />
            <button id="saveScenarioButton" type="button">儲存情境</button>
            <button id="deleteScenarioButton" type="button">刪除最後情境</button>
            <button id="resetScenariosButton" type="button">重置情境</button>
            <button id="exportBackupButton" type="button">匯出備份</button>
            <label>
              <span>選擇備份</span>
              <input id="importBackupInput" type="file" accept="application/json" />
            </label>
            <label class="restore-confirmation">
              <input id="restoreConfirmInput" type="checkbox" />
              <span>確認覆蓋本地情境</span>
            </label>
            <button id="applyBackupButton" type="button">套用備份</button>
          </div>
          <div class="backup-preview" id="backupPreview"></div>
          <div class="runtime-feedback" id="runtimeFeedback" role="status" aria-live="polite"></div>
          <div class="dashboard-switcher" id="dashboardSwitcher" aria-label="儀表板情境切換"></div>
          <div class="metric-grid" id="metricGrid"></div>
          <div class="decision-panels">
            <div>
              <h4>情境比較</h4>
              <div id="scenarioList" class="scenario-list"></div>
            </div>
            <div>
              <h4>下一步行動</h4>
              <div id="actionList" class="action-list"></div>
            </div>
          </div>
          <div class="runtime-panels">
            <section>
              <h4>投資組合報表</h4>
              <div class="dashboard-actions compact-actions">
                <button id="exportPortfolioReportButton" type="button">匯出報表</button>
              </div>
              <div id="portfolioReportPanel" class="report-list"></div>
            </section>
            <section>
              <h4>建議執行</h4>
              <div id="recommendationControlPanel" class="execution-panel"></div>
              <div id="recommendationDecisionLog" class="decision-log"></div>
              <div class="dashboard-actions compact-actions">
                <button id="acceptRecommendationButton" type="button">接受建議</button>
                <button id="rejectRecommendationButton" type="button">拒絕建議</button>
              </div>
            </section>
            <section>
              <h4>貸款情境</h4>
              <div class="dashboard-actions compact-actions">
                <input id="loanBalanceInput" type="text" placeholder="本金" inputmode="decimal" />
                <input id="loanRateInput" type="text" placeholder="年利率 %" inputmode="decimal" />
                <input id="loanMonthsInput" type="text" placeholder="期數" inputmode="numeric" />
                <button id="calculateLoanButton" type="button">試算</button>
              </div>
              <div id="loanEditableOutput" class="decision-log"></div>
              <div id="loanScenarioPanel" class="report-list"></div>
            </section>
          </div>
        </section>
        <section class="content-grid">
          <div>
            <div class="list-tools">
              <span id="resultCount">0 筆結果</span>
              <button id="clearFiltersButton" type="button">清除</button>
            </div>
            <div class="document-list" id="documentList"></div>
          </div>
          <article class="document-viewer" id="documentViewer">
            <p class="empty-state">選取知識文件以檢視生活決策規格、流程與治理內容。</p>
          </article>
        </section>
      </main>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
